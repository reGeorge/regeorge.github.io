        <h1>小满洗冷水澡</h1>

        <img src="../assets/img/cold-shower-xiaoman/featured.jpg" alt="小满洗冷水澡" class="featured-img">

        <div class="content">
            <p>今天给小满洗了冷水澡。出乎意料的是——<strong>她根本没哭</strong>。而且洗完之后出来，哼着小调，心情很好。</p>
            
            <blockquote>
                “洗完冷水澡之后，人会不自觉地哼起小调。” —— 纳瓦尔·拉吉坎特（Naval Ravikant）
            </blockquote>

            <p>这个场景和纳瓦尔在书里提到的完全一致：冷水澡带来的不是痛苦后的沮丧，而是某种<strong>清冽的愉悦感</strong>。这是一种克服挑战后的内在轻快。</p>
            
            <hr>

            <h3>观察与思考</h3>
            <ul>
                <li>小满对冷水澡的接受度比预期高。</li>
                <li>意志力训练的关键是<strong>开始</strong>，而不是<strong>忍耐</strong>。</li>
            </ul>
        </div>

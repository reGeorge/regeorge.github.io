<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTest Station · 架构全景 | reGeorge</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ========== Design Tokens ========== */
        :root {
            --bg: #F9F8F6;
            --text: #191919;
            --sub: #6E6E73;
            --accent: #0f766e;
            --accent-light: #14b8a6;
            --border: rgba(0, 0, 0, 0.08);
            --card-bg: #FFFFFF;
            --hover-bg: rgba(0, 0, 0, 0.03);
            --cat-layers:    #0f766e;
            --cat-truth:     #b45309;
            --cat-workspace: #7c3aed;
            --cat-station:   #0284c7;
            --cat-lifecycle: #059669;
            --cat-roadmap:   #dc2626;
        }

        /* ========== Reset & Base ========== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: "Noto Serif SC", serif;
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        /* ========== App Shell ========== */
        .app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        .layer { display: none; }
        .layer.active { display: block; }

        /* ========== Shared Components ========== */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--sub);
            text-decoration: none;
            font-size: 0.88rem;
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
            transition: color 0.2s;
            margin-bottom: 24px;
        }
        .back-btn:hover { color: var(--accent); }
        .back-btn svg { width: 16px; height: 16px; }
        .back-svg { display: inline; }

        .breadcrumb {
            font-size: 0.8rem;
            color: var(--sub);
            margin-bottom: 20px;
        }
        .breadcrumb a { color: var(--sub); text-decoration: none; }
        .breadcrumb a:hover { color: var(--accent); }
        .breadcrumb .sep { margin: 0 6px; }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            font-family: sans-serif;
            padding: 2px 10px;
            border-radius: 999px;
            font-weight: 500;
            letter-spacing: 0.03em;
        }
        .status-badge.stable {
            background: rgba(46, 204, 113, 0.1);
            color: #1a8a4a;
            border: 1px solid rgba(46, 204, 113, 0.25);
        }
        .status-badge.in-progress {
            background: rgba(243, 156, 18, 0.1);
            color: #b45309;
            border: 1px solid rgba(243, 156, 18, 0.25);
        }
        .status-badge.planned {
            background: rgba(149, 165, 166, 0.1);
            color: #666;
            border: 1px solid rgba(149, 165, 166, 0.25);
        }
        .status-badge.done {
            background: rgba(15, 118, 110, 0.1);
            color: #0f766e;
            border: 1px solid rgba(15, 118, 110, 0.25);
        }

        .tag-chip {
            display: inline-flex;
            align-items: center;
            font-size: 0.68rem;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 999px;
            font-family: sans-serif;
            letter-spacing: 0.04em;
        }

        /* ========== Layer 1: Atlas ========== */
        .atlas-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .atlas-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .atlas-title h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .atlas-title .logo { font-size: 1.6rem; }
        .atlas-subtitle {
            font-size: 0.88rem;
            color: var(--sub);
            margin-top: 4px;
        }

        .atlas-search {
            position: relative;
            width: 320px;
            max-width: 100%;
        }
        .atlas-search input {
            width: 100%;
            padding: 8px 16px 8px 36px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: white;
            font-size: 0.88rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .atlas-search input:focus { border-color: var(--accent); }
        .atlas-search svg {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--sub);
        }

        .atlas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
            margin-bottom: 48px;
        }

        .category-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }
        .category-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        }
        .color-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            border-radius: 12px 12px 0 0;
        }
        .category-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .category-card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 1rem;
        }
        .category-card-title .icon { font-size: 1.2rem; }
        .category-card-count {
            font-size: 0.75rem;
            font-family: sans-serif;
            color: var(--sub);
            background: var(--hover-bg);
            padding: 2px 8px;
            border-radius: 999px;
        }
        .category-card-desc {
            font-size: 0.78rem;
            color: var(--sub);
            margin: 0 0 10px;
        }
        .category-card-topics {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .category-topic-chip {
            font-size: 0.72rem;
            font-family: sans-serif;
            color: var(--sub);
            background: var(--hover-bg);
            padding: 3px 10px;
            border-radius: 999px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .category-topic-chip:hover {
            background: rgba(15, 118, 110, 0.08);
            color: var(--accent);
        }

        /* ── Atlas stats ── */
        .atlas-stats {
            display: flex;
            gap: 24px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }
        .atlas-stat {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        .atlas-stat-num {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
            font-family: sans-serif;
        }
        .atlas-stat-label {
            font-size: 0.82rem;
            color: var(--sub);
        }

        /* ── Legend & Recent ── */
        .atlas-bottom {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
        }
        .legend { display: flex; flex-wrap: wrap; gap: 12px; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--sub); }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

        .recent-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            cursor: pointer;
            font-size: 0.82rem;
        }
        .recent-item:hover { color: var(--accent); }
        .recent-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .recent-title { flex: 1; }
        .recent-date { font-size: 0.72rem; color: var(--sub); font-family: sans-serif; }

        /* ── Search results ── */
        #search-results { display: none; margin-bottom: 48px; }
        .search-results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }

        /* ========== Layer 2: Dashboard ========== */
        .dashboard-hero {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px;
            margin-bottom: 28px;
        }
        .dashboard-hero h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .dashboard-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
        }
        .dashboard-one-liner {
            font-size: 0.92rem;
            color: var(--sub);
            margin-top: 12px;
        }

        .dashboard-layout {
            display: grid;
            grid-template-columns: 1fr 260px;
            gap: 24px;
            align-items: start;
        }
        .key-nodes-section h3 {
            font-size: 0.92rem;
            margin-bottom: 16px;
            font-weight: 600;
        }
        .key-nodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }
        .key-node-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .key-node-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        .node-title {
            font-weight: 600;
            font-size: 0.92rem;
            margin-bottom: 4px;
        }
        .node-oneliner {
            font-size: 0.78rem;
            color: var(--sub);
            margin-bottom: 8px;
        }
        .node-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .node-tags {
            font-size: 0.68rem;
            color: var(--sub);
            font-family: sans-serif;
        }

        .dashboard-sidebar h3 {
            font-size: 0.88rem;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .quick-nav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 0.82rem;
            cursor: pointer;
            transition: background 0.15s;
        }
        .quick-nav-item:hover { background: var(--hover-bg); }
        .quick-nav-item .icon { font-size: 0.9rem; }

        /* ========== Layer 3: Cards ========== */
        .cards-header {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 20px;
        }
        .cards-header h2 {
            font-size: 1.3rem;
            font-weight: 700;
        }
        .cards-count {
            font-size: 0.78rem;
            color: var(--sub);
            font-family: sans-serif;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }
        .review-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .review-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        .card-title {
            font-weight: 600;
            font-size: 0.92rem;
            margin-bottom: 4px;
        }
        .card-oneliner {
            font-size: 0.78rem;
            color: var(--sub);
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .card-tags {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        /* ========== Layer 4: Detail ========== */
        .detail-layout {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 32px;
            align-items: start;
        }
        .detail-hero {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px;
            margin-bottom: 24px;
        }
        .detail-hero h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .detail-badge-row {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .detail-one-liner {
            font-size: 0.95rem;
            color: var(--sub);
            margin-top: 8px;
            line-height: 1.6;
        }
        .detail-section {
            margin-top: 24px;
        }
        .detail-section h4 {
            font-size: 0.88rem;
            font-weight: 600;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }
        .detail-body {
            font-size: 0.88rem;
            line-height: 1.9;
            color: var(--text);
            white-space: pre-wrap;
        }
        .detail-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        /* ── sidebar ── */
        .detail-sidebar-area {
            position: sticky;
            top: 24px;
        }
        .sidebar-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .sidebar-card h5 {
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .sidebar-related-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            font-size: 0.82rem;
            cursor: pointer;
            transition: color 0.15s;
        }
        .sidebar-related-item:hover { color: var(--accent); }

        /* ========== Footer ========== */
        .atlas-footer {
            text-align: center;
            padding: 40px 0 20px;
            font-size: 0.78rem;
            color: var(--sub);
        }
        .atlas-footer a { color: var(--sub); }
        .atlas-footer a:hover { color: var(--accent); }

        /* ========== Responsive ========== */
        @media (max-width: 900px) {
            .atlas-grid { grid-template-columns: 1fr; }
            .dashboard-layout { grid-template-columns: 1fr; }
            .detail-layout { grid-template-columns: 1fr; }
            .atlas-bottom { grid-template-columns: 1fr; }
            .atlas-header { flex-direction: column; align-items: flex-start; }
            .atlas-search { width: 100%; }
        }
        @media (max-width: 600px) {
            .app { padding: 20px 16px; }
            .atlas-title h1 { font-size: 1.4rem; }
            .atlas-stats { gap: 16px; }
            .key-nodes-grid { grid-template-columns: 1fr; }
            .cards-grid { grid-template-columns: 1fr; }
            .search-results-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="app">

        <!-- ==================== Layer 1: Atlas ==================== -->
        <div id="layer-atlas" class="layer active">
            <div class="atlas-header">
                <div>
                    <div class="atlas-title">
                        <span class="logo">🔬</span>
                        <h1>AutoTest Station</h1>
                    </div>
                    <p class="atlas-subtitle">从脚本仓库到服务编排 + 交互工作站的演进全景</p>
                </div>
                <div class="atlas-search">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="atlas-search-input" placeholder="搜索架构节点…">
                </div>
            </div>

            <div class="atlas-stats" id="atlas-stats"></div>

            <div id="search-results">
                <h3 style="font-size:0.92rem; margin-bottom:12px;">搜索结果</h3>
                <div class="search-results-grid" id="search-results-grid"></div>
            </div>

            <div class="atlas-grid" id="atlas-grid"></div>

            <div class="atlas-bottom">
                <div>
                    <h3 style="font-size:0.92rem; margin-bottom:12px;">图例</h3>
                    <div class="legend" id="legend"></div>
                </div>
                <div>
                    <h3 style="font-size:0.92rem; margin-bottom:12px;">最近更新</h3>
                    <div id="recent-updates"></div>
                </div>
            </div>

            <footer class="atlas-footer">
                <p><a href="../../index.html">← reGeorge</a> · AutoTest Station 架构全景</p>
                <p style="margin-top:8px;">© 2026 · 基于 caseHelper 工程实践构建</p>
            </footer>
        </div>

        <!-- ==================== Layer 2: Dashboard ==================== -->
        <div id="layer-dashboard" class="layer">
            <button class="back-btn" onclick="goBack()">
                <svg class="back-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                返回
            </button>
            <div class="breadcrumb" id="dashboard-breadcrumb"></div>
            <div class="dashboard-hero" id="dashboard-hero"></div>
            <div class="dashboard-layout">
                <div class="key-nodes-section">
                    <h3 id="nodes-section-title">关键节点</h3>
                    <div class="key-nodes-grid" id="key-nodes-grid"></div>
                </div>
                <aside class="dashboard-sidebar">
                    <h3>快速导航</h3>
                    <div id="quick-nav"></div>
                </aside>
            </div>
        </div>

        <!-- ==================== Layer 3: Cards ==================== -->
        <div id="layer-cards" class="layer">
            <button class="back-btn" id="cards-back-btn" onclick="goBack()">
                <svg class="back-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                返回
            </button>
            <div class="breadcrumb" id="cards-breadcrumb"></div>
            <div class="cards-header">
                <h2 id="cards-title"></h2>
                <span class="cards-count" id="cards-count"></span>
            </div>
            <div class="cards-grid" id="cards-grid"></div>
        </div>

        <!-- ==================== Layer 4: Detail ==================== -->
        <div id="layer-detail" class="layer">
            <button class="back-btn" id="detail-back-btn" onclick="goBack()">
                <svg class="back-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                返回
            </button>
            <div class="breadcrumb" id="detail-breadcrumb"></div>
            <div class="detail-layout">
                <div class="detail-main" id="detail-main"></div>
                <aside class="detail-sidebar-area" id="detail-sidebar"></aside>
            </div>
        </div>

    </div>

    <script src="data/architecture-graph.js"></script>
    <script>
    (function() {
        'use strict';

        var AG = ARCH_GRAPH;
        var currentView = 'atlas';
        var navHistory = [];

        // ========== Helpers ==========
        function $(id) { return document.getElementById(id); }
        function esc(s) {
            if (!s) return '';
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }
        function getCategoryById(id) { return AG.categories.find(function(c) { return c.id === id; }); }
        function getTopicById(id) { return AG.topics.find(function(t) { return t.id === id; }); }
        function getNodeById(id) { return AG.nodes.find(function(n) { return n.id === id; }); }
        function getNodesByTopic(tid) { return AG.nodes.filter(function(n) { return n.topicId === tid; }); }
        function getTopicsByCategory(cid) { return AG.topics.filter(function(t) { return t.categoryId === cid; }); }
        function getNodesByCategory(cid) {
            var tids = getTopicsByCategory(cid).map(function(t) { return t.id; });
            return AG.nodes.filter(function(n) { return tids.indexOf(n.topicId) !== -1; });
        }
        function getCategoryColor(cid) {
            var m = {
                'layers': 'var(--cat-layers)', 'truth': 'var(--cat-truth)',
                'workspace': 'var(--cat-workspace)', 'station': 'var(--cat-station)',
                'lifecycle': 'var(--cat-lifecycle)', 'roadmap': 'var(--cat-roadmap)'
            };
            return m[cid] || 'var(--sub)';
        }
        function getCategoryColorRaw(cid) {
            var c = getCategoryById(cid);
            return c ? c.color : '#6E6E73';
        }
        function statusLabel(s) {
            var m = { 'stable': '✓ stable', 'in-progress': '◐ 进行中', 'planned': '○ 规划中', 'done': '✓ 完成' };
            return m[s] || s || '';
        }

        // ========== Navigation ==========
        function navigateTo(view, data) {
            navHistory.push({ view: currentView, data: window._cd });
            showLayer(view, data);
        }
        window.goBack = function() {
            var prev = navHistory.pop();
            if (prev) showLayer(prev.view, prev.data);
            else showLayer('atlas');
        };
        function showLayer(view, data) {
            currentView = view;
            window._cd = data;
            document.querySelectorAll('.layer').forEach(function(l) { l.classList.remove('active'); });
            switch(view) {
                case 'atlas':     $('layer-atlas').classList.add('active'); navHistory = []; break;
                case 'dashboard': $('layer-dashboard').classList.add('active'); renderDashboard(data); break;
                case 'cards':     $('layer-cards').classList.add('active'); renderCards(data); break;
                case 'detail':    $('layer-detail').classList.add('active'); renderDetail(data); break;
            }
            window.scrollTo(0, 0);
            updateHash(view, data);
        }
        function updateHash(v, d) {
            var h = '#/';
            if (v === 'dashboard' && d) h = '#/topic/' + d.topicId;
            else if (v === 'cards' && d) h = '#/category/' + d.categoryId;
            else if (v === 'detail' && d) h = '#/card/' + d.nodeId;
            history.replaceState(null, '', h);
        }

        // ========== Layer 1: Atlas ==========
        function renderAtlas() {
            // Stats
            $('atlas-stats').innerHTML =
                '<div class="atlas-stat"><span class="atlas-stat-num">' + AG.categories.length + '</span><span class="atlas-stat-label">架构域</span></div>' +
                '<div class="atlas-stat"><span class="atlas-stat-num">' + AG.topics.length + '</span><span class="atlas-stat-label">主题</span></div>' +
                '<div class="atlas-stat"><span class="atlas-stat-num">' + AG.nodes.length + '</span><span class="atlas-stat-label">知识节点</span></div>';

            // Category grid
            var grid = $('atlas-grid');
            var html = '';
            AG.categories.forEach(function(cat) {
                var topics = getTopicsByCategory(cat.id);
                var nc = getNodesByCategory(cat.id).length;
                var col = getCategoryColorRaw(cat.id);
                html += '<div class="category-card" data-cat="' + esc(cat.id) + '">' +
                    '<div class="color-bar" style="background:' + col + '"></div>' +
                    '<div class="category-card-header">' +
                    '<div class="category-card-title"><span class="icon">' + cat.icon + '</span><span>' + esc(cat.title) + '</span></div>' +
                    '<span class="category-card-count">' + nc + ' 节点</span></div>' +
                    '<p class="category-card-desc">' + esc(cat.description) + '</p>' +
                    '<div class="category-card-topics">' +
                    topics.map(function(t) {
                        return '<span class="category-topic-chip" data-topic="' + esc(t.id) + '">' + esc(t.title) + '</span>';
                    }).join('') +
                    '</div></div>';
            });
            grid.innerHTML = html;

            grid.querySelectorAll('.category-card').forEach(function(card) {
                card.addEventListener('click', function(e) {
                    var tc = e.target.closest('.category-topic-chip');
                    if (tc) { e.stopPropagation(); navigateTo('dashboard', { topicId: tc.dataset.topic }); return; }
                    navigateTo('cards', { categoryId: this.dataset.cat });
                });
            });

            // Recent
            var recent = AG.nodes.slice().sort(function(a, b) {
                return (b.updatedAt || '').localeCompare(a.updatedAt || '');
            }).slice(0, 6);
            $('recent-updates').innerHTML = recent.map(function(n) {
                var tp = getTopicById(n.topicId);
                var ct = tp ? getCategoryById(tp.categoryId) : null;
                var col = ct ? getCategoryColorRaw(ct.id) : '#6E6E73';
                return '<div class="recent-item" data-node="' + esc(n.id) + '">' +
                    '<div class="recent-dot" style="background:' + col + '"></div>' +
                    '<span class="recent-title">' + esc(n.title) + '</span>' +
                    '<span class="recent-date">' + (n.updatedAt || '').slice(5) + '</span></div>';
            }).join('');
            $('recent-updates').querySelectorAll('.recent-item').forEach(function(i) {
                i.addEventListener('click', function() { navigateTo('detail', { nodeId: this.dataset.node }); });
            });

            // Legend
            $('legend').innerHTML = AG.categories.map(function(c) {
                return '<div class="legend-item"><div class="legend-dot" style="background:' + getCategoryColorRaw(c.id) + '"></div><span>' + esc(c.title) + '</span></div>';
            }).join('');

            // Search
            $('atlas-search-input').addEventListener('input', function() {
                var q = this.value.trim().toLowerCase();
                if (q.length < 2) {
                    $('search-results').style.display = 'none';
                    $('atlas-grid').style.display = '';
                    return;
                }
                var matches = AG.nodes.filter(function(n) {
                    return n.title.toLowerCase().indexOf(q) !== -1 ||
                           n.oneLiner.toLowerCase().indexOf(q) !== -1 ||
                           (n.detail || '').toLowerCase().indexOf(q) !== -1 ||
                           (n.tags || []).some(function(t) { return t.toLowerCase().indexOf(q) !== -1; });
                });
                $('atlas-grid').style.display = 'none';
                $('search-results').style.display = 'block';
                var g = $('search-results-grid');
                g.innerHTML = matches.length ?
                    matches.map(function(n) { return cardHtml(n); }).join('') :
                    '<p style="color:var(--sub);font-size:0.88rem;">无匹配节点</p>';
                attachCardClicks(g);
            });
        }

        // ========== Layer 2: Dashboard ==========
        function renderDashboard(data) {
            var topic = getTopicById(data.topicId);
            if (!topic) return;
            var cat = getCategoryById(topic.categoryId);
            var nodes = getNodesByTopic(topic.id);
            var col = getCategoryColorRaw(topic.categoryId);

            $('dashboard-breadcrumb').innerHTML =
                '<a href="#/" onclick="event.preventDefault();navigateTo(\'atlas\')">首页</a>' +
                '<span class="sep">›</span>' +
                '<a href="#/" onclick="event.preventDefault();navigateTo(\'cards\',{categoryId:\'' + esc(topic.categoryId) + '\'})">' + (cat ? esc(cat.title) : '') + '</a>' +
                '<span class="sep">›</span><span>' + esc(topic.title) + '</span>';

            $('dashboard-hero').innerHTML =
                '<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">' +
                '<span class="tag-chip" style="background:' + col + '20;color:' + col + ';border:1px solid ' + col + '40;">' + (cat ? esc(cat.title) : '') + '</span>' +
                '<span class="status-badge ' + esc(topic.status || '') + '">' + statusLabel(topic.status) + '</span>' +
                '</div>' +
                '<h2>' + esc(topic.title) + '</h2>' +
                '<div class="dashboard-one-liner">' + esc(topic.oneLiner) + '</div>';

            $('nodes-section-title').textContent = '关键节点 (' + nodes.length + ')';
            $('key-nodes-grid').innerHTML = nodes.map(function(n) {
                return '<div class="key-node-card" data-node="' + esc(n.id) + '">' +
                    '<div class="node-title">' + esc(n.title) + '</div>' +
                    '<div class="node-oneliner">' + esc(n.oneLiner) + '</div>' +
                    '<div class="node-meta">' +
                    '<span class="node-tags">' + (n.tags || []).slice(0, 3).map(function(t) { return '#' + esc(t); }).join(' ') + '</span>' +
                    '<span class="status-badge ' + esc(n.status || '') + '" style="font-size:0.6rem;">' +
                    (n.status === 'stable' ? '✓' : n.status === 'done' ? '✓' : '○') + '</span></div></div>';
            }).join('');

            $('key-nodes-grid').querySelectorAll('.key-node-card').forEach(function(c) {
                c.addEventListener('click', function() { navigateTo('detail', { nodeId: this.dataset.node }); });
            });

            var siblings = getTopicsByCategory(topic.categoryId).filter(function(t) { return t.id !== topic.id; });
            $('quick-nav').innerHTML = siblings.map(function(t) {
                return '<div class="quick-nav-item" data-topic="' + esc(t.id) + '"><span class="icon">📌</span><span>' + esc(t.title) + '</span></div>';
            }).join('') +
            '<div class="quick-nav-item" data-action="all"><span class="icon">📋</span><span>查看全部 ' + nodes.length + ' 个节点</span></div>';

            $('quick-nav').querySelectorAll('.quick-nav-item').forEach(function(i) {
                i.addEventListener('click', function() {
                    if (this.dataset.action === 'all') navigateTo('cards', { categoryId: topic.categoryId });
                    else if (this.dataset.topic) navigateTo('dashboard', { topicId: this.dataset.topic });
                });
            });
        }

        // ========== Layer 3: Cards ==========
        function cardHtml(n) {
            var tp = getTopicById(n.topicId);
            var cat = tp ? getCategoryById(tp.categoryId) : null;
            var col = cat ? getCategoryColorRaw(cat.id) : '#6E6E73';
            return '<div class="review-card" data-node="' + esc(n.id) + '">' +
                '<div class="card-title">' + esc(n.title) + '</div>' +
                '<div class="card-oneliner">' + esc(n.oneLiner) + '</div>' +
                '<div class="card-footer">' +
                '<div class="card-tags">' + (n.tags || []).slice(0, 3).map(function(t) {
                    return '<span class="tag-chip" style="background:' + col + '12;color:' + col + ';border:1px solid ' + col + '30;font-size:0.62rem;">' + esc(t) + '</span>';
                }).join('') + '</div>' +
                '<span class="status-badge ' + esc(n.status || '') + '" style="font-size:0.6rem;">' + statusLabel(n.status) + '</span>' +
                '</div></div>';
        }
        function attachCardClicks(el) {
            el.querySelectorAll('.review-card').forEach(function(c) {
                c.addEventListener('click', function() { navigateTo('detail', { nodeId: this.dataset.node }); });
            });
        }
        function renderCards(data) {
            var cat = getCategoryById(data.categoryId);
            var nodes, title;
            if (data.topicId) {
                var tp = getTopicById(data.topicId);
                nodes = getNodesByTopic(data.topicId);
                title = tp ? tp.title : '';
            } else {
                nodes = getNodesByCategory(data.categoryId);
                title = cat ? cat.title : '';
            }
            $('cards-breadcrumb').innerHTML =
                '<a href="#/" onclick="event.preventDefault();navigateTo(\'atlas\')">首页</a>' +
                '<span class="sep">›</span><span>' + esc(title) + '</span>';
            $('cards-title').textContent = title;
            $('cards-count').textContent = nodes.length + ' 个节点';
            $('cards-grid').innerHTML = nodes.map(function(n) { return cardHtml(n); }).join('');
            attachCardClicks($('cards-grid'));
        }

        // ========== Layer 4: Detail ==========
        function renderDetail(data) {
            var node = getNodeById(data.nodeId);
            if (!node) return;
            var topic = getTopicById(node.topicId);
            var cat = topic ? getCategoryById(topic.categoryId) : null;
            var col = cat ? getCategoryColorRaw(cat.id) : '#6E6E73';

            // Breadcrumb
            $('detail-breadcrumb').innerHTML =
                '<a href="#/" onclick="event.preventDefault();navigateTo(\'atlas\')">首页</a><span class="sep">›</span>' +
                (cat ? '<a href="#/" onclick="event.preventDefault();navigateTo(\'cards\',{categoryId:\'' + esc(cat.id) + '\'})">' + esc(cat.title) + '</a><span class="sep">›</span>' : '') +
                (topic ? '<a href="#/" onclick="event.preventDefault();navigateTo(\'dashboard\',{topicId:\'' + esc(topic.id) + '\'})">' + esc(topic.title) + '</a><span class="sep">›</span>' : '') +
                '<span>' + esc(node.title) + '</span>';

            // Main content
            var mainH = '<div class="detail-hero">' +
                '<div class="detail-badge-row">' +
                (cat ? '<span class="tag-chip" style="background:' + col + '20;color:' + col + ';border:1px solid ' + col + '40;">' + esc(cat.title) + '</span>' : '') +
                '<span class="status-badge ' + esc(node.status || '') + '">' + statusLabel(node.status) + '</span>' +
                '</div>' +
                '<h2>' + esc(node.title) + '</h2>' +
                '<div class="dashboard-meta"><span class="date" style="font-size:0.78rem;font-family:sans-serif;color:var(--sub);">更新 ' + esc(node.updatedAt || '') + '</span></div>' +
                '<div class="detail-one-liner">' + esc(node.oneLiner) + '</div>' +
                '</div>';

            // Detail body
            if (node.detail) {
                mainH += '<div class="detail-section"><h4>详细说明</h4>' +
                    '<div class="detail-body">' + esc(node.detail) + '</div></div>';
            }

            // Tags
            if (node.tags && node.tags.length) {
                mainH += '<div class="detail-section"><h4>标签</h4>' +
                    '<div class="detail-tags">' + node.tags.map(function(t) {
                        return '<span class="tag-chip" style="background:' + col + '12;color:' + col + ';border:1px solid ' + col + '30;">' + esc(t) + '</span>';
                    }).join('') + '</div></div>';
            }

            $('detail-main').innerHTML = mainH;

            // Sidebar: same-topic nodes
            var sameTopicNodes = getNodesByTopic(node.topicId).filter(function(n) { return n.id !== node.id; });
            var sidebarH = '';

            if (topic) {
                sidebarH += '<div class="sidebar-card"><h5>同主题节点</h5>';
                if (sameTopicNodes.length) {
                    sidebarH += sameTopicNodes.map(function(n) {
                        return '<div class="sidebar-related-item" data-node="' + esc(n.id) + '">→ ' + esc(n.title) + '</div>';
                    }).join('');
                } else {
                    sidebarH += '<div style="font-size:0.78rem;color:var(--sub);">当前主题下仅此一个节点</div>';
                }
                sidebarH += '</div>';
            }

            // Metadata card
            sidebarH += '<div class="sidebar-card"><h5>元信息</h5>' +
                '<div style="font-size:0.78rem;color:var(--sub);line-height:1.8;">' +
                '<div>分类：' + (cat ? esc(cat.title) : '-') + '</div>' +
                '<div>主题：' + (topic ? esc(topic.title) : '-') + '</div>' +
                '<div>状态：' + statusLabel(node.status) + '</div>' +
                '<div>更新：' + esc(node.updatedAt || '-') + '</div>' +
                '</div></div>';

            $('detail-sidebar').innerHTML = sidebarH;

            // Bind clicks on sidebar related items
            $('detail-sidebar').querySelectorAll('.sidebar-related-item').forEach(function(i) {
                i.addEventListener('click', function() {
                    navigateTo('detail', { nodeId: this.dataset.node });
                });
            });
        }

        // ========== Hash routing ==========
        function handleHash() {
            var h = location.hash || '#/';
            var parts = h.replace('#/', '').split('/');
            if (parts[0] === 'topic' && parts[1]) {
                var tp = getTopicById(parts[1]);
                if (tp) { showLayer('dashboard', { topicId: parts[1] }); return; }
            }
            if (parts[0] === 'category' && parts[1]) {
                var cat = getCategoryById(parts[1]);
                if (cat) { showLayer('cards', { categoryId: parts[1] }); return; }
            }
            if (parts[0] === 'card' && parts[1]) {
                var nd = getNodeById(parts[1]);
                if (nd) { showLayer('detail', { nodeId: parts[1] }); return; }
            }
            showLayer('atlas');
        }

        // ========== Init ==========
        renderAtlas();
        handleHash();
        window.addEventListener('hashchange', handleHash);

        // Expose for breadcrumb onclick
        window.navigateTo = navigateTo;

    })();
    </script>
</body>
</html>

var ERAS = ['全部','古代','近代','当代'];
var curEra = '全部', curId = null, notes = {}, bookNotes = {};

function schoolColor(s){return SCHOOL_COLOR[s]||'#888780';}

function initEraChips(){
  var html='';
  ERAS.forEach(function(e){html+='<span class="chip'+(e===curEra?' on':'')+'" onclick="setEra(\''+e+'\',this)">'+e+'</span>';});
  document.getElementById('eraChips').innerHTML=html;
}

function setEra(e,el){
  curEra=e;
  document.querySelectorAll('#eraChips .chip').forEach(function(c){c.classList.remove('on');});
  el.classList.add('on');
  render();
}

function getFiltered(){
  var q=(document.getElementById('searchBox').value||'').toLowerCase();
  return PHILOSOPHERS.filter(function(p){
    if(curEra!=='全部'&&p.era!==curEra) return false;
    if(q&&p.name.indexOf(q)<0&&(p.orig||'').toLowerCase().indexOf(q)<0) return false;
    return true;
  });
}

function booksDone(p){return p.books.filter(function(b){return b.status==='done';}).length;}
function booksReading(p){return p.books.filter(function(b){return b.status==='reading';}).length;}

function renderSidebar(){
  var f=getFiltered(), html='';
  var lastEra='';
  f.forEach(function(p){
    if(p.era!==lastEra&&curEra==='全部'){html+='<div class="era-label">'+p.era+'</div>';lastEra=p.era;}
    var done=booksDone(p), total=p.books.length;
    var pct=total>0?Math.round(done/total*100):0;
    var progColor=done===total&&total>0?'#639922':schoolColor(p.school);
    html+='<div class="phi-item'+(p.id===curId?' active':'')+'" onclick="selectPhi(\''+p.id+'\')">'+
      '<div style="display:flex;align-items:center;gap:6px">'+
      '<span class="school-dot" style="background:'+progColor+'"></span>'+
      '<span class="phi-name">'+p.name+'</span></div>'+
      '<div class="phi-sub">'+p.school+' · '+p.dates+'</div>'+
      '<div class="phi-prog"><div class="phi-prog-bg"><div class="phi-prog-fill" style="width:'+pct+'%;background:'+progColor+'"></div></div>'+
      '<span class="phi-prog-txt">'+done+'/'+total+'</span></div></div>';
  });
  document.getElementById('sidebar').innerHTML=html||'<div style="padding:16px;text-align:center;font-size:12px;color:var(--color-text-tertiary)">无匹配结果</div>';
}

function renderHeader(p){
  if(!p){document.getElementById('phiHeader').innerHTML='';return;}
  var sc=schoolColor(p.school);
  document.getElementById('phiHeader').innerHTML=
    '<div class="phi-header">'+
    '<div class="phi-title-row">'+
    '<div class="phi-avatar" style="background:'+sc+'22;border-color:'+sc+'44;color:'+sc+'">'+p.avatar+'</div>'+
    '<div class="phi-meta">'+
    '<div class="phi-full-name">'+p.name+'<span style="font-size:13px;font-weight:400;color:var(--color-text-tertiary);margin-left:8px">'+p.orig+'</span></div>'+
    '<div class="phi-dates">'+p.school+' · '+p.dates+'</div>'+
    '</div></div>'+
    '<div class="phi-tagline">"'+p.tagline+'"</div>'+
    '<div class="theme-tags">'+p.themes.map(function(t){return '<span class="theme-tag">'+t+'</span>';}).join('')+'</div>'+
    '</div>';
}

function getStatus(p,bi){return p.books[bi].status;}
function setStatus(pid,bi){
  var p=PHILOSOPHERS.find(function(x){return x.id===pid;});
  if(!p) return;
  var cycle={unread:'reading',reading:'done',done:'unread'};
  p.books[bi].status=cycle[p.books[bi].status]||'unread';
  render();
}

function statusLabel(s){
  if(s==='reading') return '在读中';
  if(s==='done') return '已读完';
  return '未读';
}

function renderCenter(p){
  var el=document.getElementById('centerBody');
  if(!p){el.innerHTML='<div class="empty-msg"><i class="ti ti-arrow-left" style="font-size:24px" aria-hidden="true"></i><span>从左侧选择一位哲学家</span></div>';return;}
  var prereqHtml='';
  if(p.prereqs.length>0){
    prereqHtml='<div class="sec-label" style="margin-bottom:6px">建议先读</div><div class="prereq-row">';
    p.prereqs.forEach(function(rid){
      var rp=PHILOSOPHERS.find(function(x){return x.id===rid;});
      if(!rp) return;
      var done=booksDone(rp)===rp.books.length&&rp.books.length>0;
      prereqHtml+='<span class="prereq-chip'+(done?' done-prereq':'')+'" onclick="selectPhi(\''+rid+'\')">'+
        (done?'<i class="ti ti-check" style="font-size:12px" aria-hidden="true"></i> ':'')+rp.name+'</span>';
    });
    prereqHtml+='</div>';
  }
  var booksHtml=p.books.map(function(b,i){
    var dots='<div class="diff-dots">';
    for(var d=1;d<=5;d++) dots+='<span class="diff-dot '+(d<=b.diff?'on':'off')+'"></span>';
    dots+='</div>';
    var sc=p.books[i].status;
    var bnKey=p.id+'_'+i;
    var bn=bookNotes[bnKey]||b.note||'';
    return '<div class="book-card">'+
      '<div class="book-top">'+
      '<div class="book-info">'+
      '<div class="book-title">'+(b.rec?'<i class="ti ti-star" style="font-size:12px;color:#BA7517;margin-right:3px" aria-hidden="true"></i>':'')+b.title+'</div>'+
      '<div class="book-orig">'+b.orig+' ('+b.year+')</div>'+
      '<div class="book-meta">'+dots+
      '<span class="est-time"><i class="ti ti-clock" style="font-size:12px" aria-hidden="true"></i> 约'+b.hrs+'h</span>'+
      (b.rec?'<span class="rec-badge">推荐入手</span>':'')+
      '</div></div>'+
      '<button class="status-btn '+sc+'" onclick="setStatus(\''+p.id+'\','+i+')">'+statusLabel(sc)+'</button>'+
      '</div>'+
      '<textarea class="book-note" placeholder="读书笔记…" data-key="'+bnKey+'" oninput="saveBookNote(this)">'+esc(bn)+'</textarea>'+
      '</div>';
  }).join('');
  el.innerHTML=prereqHtml+'<div class="sec-label">核心书目</div>'+booksHtml;
}

function renderRightPanel(p){
  document.getElementById('rpNote').value=p?notes[p.id]||'':'';
  var allDone=0,allReading=0,allTotal=0,allHrs=0;
  PHILOSOPHERS.forEach(function(ph){
    ph.books.forEach(function(b){
      allTotal++;allHrs+=b.hrs;
      if(b.status==='done') allDone++;
      if(b.status==='reading') allReading++;
    });
  });
  document.getElementById('statDone').textContent=allDone;
  document.getElementById('statReading').textContent=allReading;
  document.getElementById('statTotal').textContent=allTotal;
  var doneHrs=PHILOSOPHERS.reduce(function(s,ph){return s+ph.books.reduce(function(t,b){return t+(b.status==='done'?b.hrs:0);},0);},0);
  document.getElementById('statHours').textContent=doneHrs+'h';
  document.getElementById('globalProg').style.width=Math.round(allDone/allTotal*100)+'%';
  document.getElementById('globalProgTxt').textContent=allDone+' / '+allTotal+' 本已读';
  var ul=document.getElementById('unlockList');
  if(!p){ul.innerHTML='<div style="padding:12px;font-size:12px;color:var(--color-text-tertiary)">先选择哲学家</div>';return;}
  var unlocks=PHILOSOPHERS.filter(function(x){return x.prereqs.indexOf(p.id)>=0;});
  if(unlocks.length===0){ul.innerHTML='<div style="padding:12px;font-size:12px;color:var(--color-text-tertiary)">暂无直接后继</div>';return;}
  ul.innerHTML=unlocks.map(function(u){
    var done=booksDone(p)===p.books.length;
    return '<div class="unlock-item" onclick="selectPhi(\''+u.id+'\')">'+
      '<span class="school-dot" style="background:'+schoolColor(u.school)+'"></span>'+
      '<span style="flex:1">'+u.name+'</span>'+
      (done?'<i class="ti ti-lock-open" style="font-size:13px;color:#639922" aria-hidden="true"></i>':
            '<i class="ti ti-lock" style="font-size:13px;color:var(--color-text-tertiary)" aria-hidden="true"></i>')+
      '</div>';
  }).join('');
  var btn=document.getElementById('askBtn');
  btn.onclick=function(){askClaude(p);};
}

function render(){
  var f=getFiltered();
  var p=curId?PHILOSOPHERS.find(function(x){return x.id===curId;}):null;
  renderSidebar();
  renderHeader(p);
  renderCenter(p);
  renderRightPanel(p);
}

function selectPhi(id){curId=id;render();}
function saveNote(){var p=PHILOSOPHERS.find(function(x){return x.id===curId;});if(p) notes[p.id]=document.getElementById('rpNote').value;}
function saveBookNote(el){bookNotes[el.getAttribute('data-key')]=el.value;}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

function askClaude(p){
  var done=PHILOSOPHERS.filter(function(x){return booksDone(x)>0;}).map(function(x){return x.name+'('+booksDone(x)+'/'+x.books.length+'本)';}).join('、')||'暂无';
  var reading=PHILOSOPHERS.filter(function(x){return booksReading(x)>0;}).map(function(x){return x.name;}).join('、')||'暂无';
  var cur=p?' 我目前在看 '+p.name+' 的书。':'';
  sendPrompt('我在系统学习哲学，已读过：'+done+'；在读：'+reading+'。'+cur+'请根据我的进度，推荐接下来3~5本最值得读的书，并说明理由和阅读顺序。');
}

initEraChips();
render();
</script>

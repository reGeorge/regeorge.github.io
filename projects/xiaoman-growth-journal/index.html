<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>小满成长记录</title>
  <style>
    :root {
      --bg: #f5efe4;
      --paper: rgba(255, 251, 245, 0.92);
      --ink: #2f241d;
      --muted: #7d6758;
      --accent: #a84f2d;
      --accent-soft: #ead0bb;
      --line: rgba(120, 90, 64, 0.16);
      --shadow: 0 24px 60px rgba(77, 48, 29, 0.12);
      --daily: #b35c35;
      --weekly: #8a6d3b;
      --monthly: #6e7d57;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Songti SC", "STSong", "SimSun", "Noto Serif SC", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.62), transparent 38%),
        linear-gradient(180deg, #f7f1e8 0%, #efe1cf 100%);
      min-height: 100vh;
    }
    main {
      width: min(1240px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }
    .hero, .panel, .report-column, .highlight-item, .timeline-card, .bar {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }
    .hero {
      padding: 28px;
      margin-bottom: 20px;
      background-image: linear-gradient(135deg, rgba(255,255,255,0.78), rgba(232,196,164,0.35));
    }
    .eyebrow {
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      font-size: 12px;
    }
    h1 {
      margin: 10px 0 12px;
      font-size: clamp(34px, 6vw, 58px);
      line-height: 1.02;
      font-weight: 700;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.7;
      max-width: 760px;
    }
    .overview-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .panel {
      padding: 22px;
    }
    .panel h2 {
      margin: 0 0 12px;
      font-size: 24px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }
    .stat {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(168, 79, 45, 0.12);
    }
    .stat-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }
    .stat-value {
      font-size: 28px;
      line-height: 1;
    }
    .mock-note {
      font-size: 13px;
      color: var(--accent);
      margin-bottom: 14px;
    }
    .chart {
      display: grid;
      gap: 12px;
    }
    .bar-row {
      display: grid;
      grid-template-columns: 54px 1fr 38px;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 14px;
    }
    .bar-track {
      height: 10px;
      border-radius: 999px;
      background: rgba(168, 79, 45, 0.08);
      overflow: hidden;
    }
    .bar {
      height: 100%;
      border: none;
      box-shadow: none;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), #db9f72);
    }
    .report-column {
      padding: 0;
      margin-bottom: 18px;
      overflow: hidden;
    }
    .report-column:last-child {
      margin-bottom: 0;
    }
    .report-column.daily { border-left: 6px solid var(--daily); }
    .report-column.weekly { border-left: 6px solid var(--weekly); }
    .report-column.monthly { border-left: 6px solid var(--monthly); }
    .column-summary {
      color: var(--muted);
      line-height: 1.7;
    }
    .column-toggle {
      list-style: none;
      cursor: pointer;
      padding: 18px 18px 16px;
    }
    .column-toggle::-webkit-details-marker {
      display: none;
    }
    .column-toggle-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }
    .column-toggle-copy {
      flex: 1;
    }
    .column-toggle-indicator {
      color: var(--accent);
      white-space: nowrap;
      font-size: 0.88rem;
      padding-top: 2px;
    }
    .report-column[open] .column-toggle-indicator {
      color: var(--ink);
    }
    .column-label {
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .column-title {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.15;
    }
    .column-summary {
      color: var(--muted);
      line-height: 1.7;
    }
    .column-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
    }
    .mini-stat {
      border-radius: 18px;
      padding: 12px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(168, 79, 45, 0.12);
    }
    .mini-stat .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }
    .mini-stat .value {
      font-size: 22px;
    }
    .section-title {
      margin: 18px 0 12px;
      font-size: 20px;
    }
    .column-body {
      padding: 0 18px 18px;
      border-top: 1px solid var(--line);
    }
    .highlight-list, .timeline-list {
      display: grid;
      gap: 12px;
    }
    .highlight-item, .timeline-card {
      padding: 14px 16px;
      box-shadow: none;
      backdrop-filter: none;
      background: rgba(255,255,255,0.72);
    }
    .item-top, .timeline-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
    }
    .item-amount, .timeline-total {
      color: var(--accent);
      white-space: nowrap;
    }
    .item-meta, .timeline-meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }
    .timeline-body {
      margin-top: 10px;
      color: var(--muted);
      line-height: 1.7;
    }
    .footer-links {
      padding-top: 18px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .footer-links a {
      color: var(--accent);
      text-decoration: none;
    }
    .empty {
      color: var(--muted);
      padding: 10px 0;
    }
    @media (max-width: 980px) {
      .overview-grid {
        grid-template-columns: 1fr;
      }
      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (max-width: 520px) {
      main {
        width: min(100vw - 20px, 1240px);
        padding-top: 20px;
      }
      .hero, .panel, .report-column {
        padding: 18px;
      }
      .stats, .column-stats {
        grid-template-columns: 1fr 1fr;
      }
      .stat-value {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="eyebrow">XiaoMan Growth Journal</div>
      <h1>小满成长记录</h1>
      <p>把日报、周报、月报放在同一个页面里并排查看，适合快速横向比较，也更方便回顾一段时间里的变化。</p>
    </section>

    <section class="overview-grid">
      <div class="panel">
        <h2>总览</h2>
        <p id="overview-summary">正在加载最新的日报、周报和月报数据。</p>
        <div class="stats">
          <div class="stat"><div class="stat-label">日报磁贴</div><div class="stat-value" id="daily-magnets">0</div></div>
          <div class="stat"><div class="stat-label">周报磁贴</div><div class="stat-value" id="weekly-magnets">0</div></div>
          <div class="stat"><div class="stat-label">月报磁贴</div><div class="stat-value" id="monthly-magnets">0</div></div>
          <div class="stat"><div class="stat-label">本月活跃天</div><div class="stat-value" id="monthly-days">0</div></div>
        </div>
      </div>

      <div class="panel">
        <h2>图表预览</h2>
        <div class="mock-note">以下柱状图是 Mock 交互预览，只用于看展示效果，不会写回也不会篡改任何真实报告数据。</div>
        <div class="chart" id="mock-chart"></div>
      </div>
    </section>

    <section id="report-grid"></section>
  </main>

  <script>
    const reportKinds = [
      { key: "daily", label: "日报", css: "daily" },
      { key: "weekly", label: "周报", css: "weekly" },
      { key: "monthly", label: "月报", css: "monthly" },
    ];

    const refs = {
      grid: document.getElementById("report-grid"),
      overviewSummary: document.getElementById("overview-summary"),
      dailyMagnets: document.getElementById("daily-magnets"),
      weeklyMagnets: document.getElementById("weekly-magnets"),
      monthlyMagnets: document.getElementById("monthly-magnets"),
      monthlyDays: document.getElementById("monthly-days"),
      mockChart: document.getElementById("mock-chart"),
    };

    function renderHighlights(items) {
      if (!items.length) {
        return '<div class="empty">这个周期还没有亮点记录。</div>';
      }
      return items.map((item) => `
        <article class="highlight-item">
          <div class="item-top">
            <strong>${item.description || "未命名记录"}</strong>
            <span class="item-amount">+${item.amount || 0}</span>
          </div>
          <div class="item-meta">${item.type || "record"} · ${item.source || "unknown"}</div>
        </article>
      `).join("");
    }

    function renderTimeline(items) {
      if (!items.length) {
        return '<div class="empty">这个周期还没有时间线内容。</div>';
      }
      return items.slice(0, 4).map((item) => `
        <article class="timeline-card">
          <div class="timeline-top">
            <strong>${item.date}</strong>
            <span class="timeline-total">+${item.magnet_total || 0}</span>
          </div>
          <div class="timeline-meta">${item.count || 0} 条记录</div>
          <div class="timeline-body">${(item.items || []).slice(0, 3).map((entry) => entry.description).join(" / ") || "暂无详情"}</div>
        </article>
      `).join("");
    }

    function renderColumn(kind, payload) {
      const jsonPath = `data/${kind}_summary.json`;
      const mdPath = `data/${kind}_summary.md`;
      const messagePath = `data/${kind}_message.txt`;
      return `
        <details class="report-column ${kind}" ${kind === "weekly" ? "open" : ""}>
          <summary class="column-toggle">
            <div class="column-toggle-head">
              <div class="column-toggle-copy">
                <div class="column-label">${payload.period_caption || kind}</div>
                <h2 class="column-title">${payload.title || "小满成长记录"}</h2>
                <div class="column-summary">${payload.summary || "暂无摘要。"}</div>
              </div>
              <div class="column-toggle-indicator">展开 / 收起</div>
            </div>
            <div class="column-stats">
              <div class="mini-stat">
                <div class="label">时间范围</div>
                <div class="value">${payload.label || "-"}</div>
              </div>
              <div class="mini-stat">
                <div class="label">记录数</div>
                <div class="value">${payload.stats?.count ?? 0}</div>
              </div>
              <div class="mini-stat">
                <div class="label">磁贴</div>
                <div class="value">${payload.stats?.magnet_total ?? 0}</div>
              </div>
              <div class="mini-stat">
                <div class="label">活跃天数</div>
                <div class="value">${payload.stats?.active_days ?? 0}</div>
              </div>
            </div>
          </summary>

          <div class="column-body">
            <h3 class="section-title">亮点</h3>
            <div class="highlight-list">${renderHighlights(payload.highlights || [])}</div>
            <h3 class="section-title">时间线</h3>
            <div class="timeline-list">${renderTimeline(payload.timeline || [])}</div>

            <div class="footer-links">
              <a href="${jsonPath}">查看 JSON</a>
              <a href="${mdPath}">查看 Markdown</a>
              <a href="${messagePath}">查看摘要</a>
            </div>
          </div>
        </details>
      `;
    }

    function renderMockChart() {
      const mockData = [
        { label: "周一", value: 3 },
        { label: "周二", value: 5 },
        { label: "周三", value: 2 },
        { label: "周四", value: 6 },
        { label: "周五", value: 4 },
        { label: "周末", value: 7 },
      ];
      const max = Math.max(...mockData.map((item) => item.value), 1);
      refs.mockChart.innerHTML = mockData.map((item) => `
        <div class="bar-row">
          <strong>${item.label}</strong>
          <div class="bar-track">
            <div class="bar" style="width:${(item.value / max) * 100}%"></div>
          </div>
          <span>${item.value}</span>
        </div>
      `).join("");
    }

    async function loadReports() {
      const payloads = await Promise.all(
        reportKinds.map(async ({ key }) => {
          const response = await fetch(`data/${key}_summary.json`, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`failed to load data/${key}_summary.json`);
          }
          return { key, payload: await response.json() };
        })
      );

      refs.grid.innerHTML = payloads
        .map(({ key, payload }) => renderColumn(key, payload))
        .join("");

      const daily = payloads.find((item) => item.key === "daily")?.payload || {};
      const weekly = payloads.find((item) => item.key === "weekly")?.payload || {};
      const monthly = payloads.find((item) => item.key === "monthly")?.payload || {};

      refs.dailyMagnets.textContent = String(daily.stats?.magnet_total ?? 0);
      refs.weeklyMagnets.textContent = String(weekly.stats?.magnet_total ?? 0);
      refs.monthlyMagnets.textContent = String(monthly.stats?.magnet_total ?? 0);
      refs.monthlyDays.textContent = String(monthly.stats?.active_days ?? 0);
      refs.overviewSummary.textContent = [
        daily.summary || "日报暂无摘要。",
        weekly.summary || "周报暂无摘要。",
        monthly.summary || "月报暂无摘要。"
      ].join(" ");
    }

    renderMockChart();
    loadReports().catch((error) => {
      refs.overviewSummary.textContent = String(error);
      refs.grid.innerHTML = '<div class="panel">报告加载失败，请稍后重试。</div>';
    });
  </script>
</body>
</html>
